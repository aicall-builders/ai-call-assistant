name: Deploy Lambda Functions

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/auth_handler.py'
      - 'lambda/call_handler.py'
      - 'lambda/nlp_handler.py'
      - 'lambda/keywords.json'

jobs:
  deploy-auth:
    name: Deploy auth_handler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if auth_handler changed
        id: check_auth
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "lambda/auth_handler.py"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check_auth.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy auth_handler to Lambda
        if: steps.check_auth.outputs.changed == 'true'
        run: |
          cd lambda
          zip auth_handler.zip auth_handler.py
          aws lambda update-function-code \
            --function-name call-recorder-api-auth \
            --zip-file fileb://auth_handler.zip
          echo "✅ auth_handler 배포 완료"

  deploy-call:
    name: Deploy call_handler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if call_handler changed
        id: check_call
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE "lambda/call_handler.py|lambda/keywords.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check_call.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy call_handler to Lambda
        if: steps.check_call.outputs.changed == 'true'
        run: |
          cd lambda
          zip call_handler.zip call_handler.py keywords.json
          aws lambda update-function-code \
            --function-name call-recorder-api-call \
            --zip-file fileb://call_handler.zip
          echo "✅ call_handler 배포 완료"

  deploy-nlp:
    name: Deploy nlp_handler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if nlp_handler changed
        id: check_nlp
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE "lambda/nlp_handler.py|lambda/keywords.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.check_nlp.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy nlp_handler to Lambda
        if: steps.check_nlp.outputs.changed == 'true'
        run: |
          cd lambda
          zip nlp_handler.zip nlp_handler.py keywords.json
          aws lambda update-function-code \
            --function-name call-recorder-api-nlp \
            --zip-file fileb://nlp_handler.zip
          echo "✅ nlp_handler 배포 완료"